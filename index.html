<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riksan Dropship | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/toast.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar glass">
        <a href="#" class="logo">Riksan<span>Drop.</span></a>
        <div class="nav-actions">
            <div class="search-box glass-light">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari gaya Anda...">
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-badge" id="cartBadge">0</span>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <h1 class="gradient-text">Tingkatkan Gaya Anda.</h1>
        <p>Koleksi eksklusif dengan kualitas tanpa kompromi.</p>
        <div class="filters" id="categoryFilters">
            <button class="filter-btn active" onclick="filterProducts('Semua')">Semua</button>
            <button class="filter-btn" onclick="filterProducts('Sepatu')">Sepatu</button>
            <button class="filter-btn" onclick="filterProducts('Pakaian')">Pakaian</button>
            <button class="filter-btn" onclick="filterProducts('Aksesoris')">Aksesoris</button>
        </div>
    </section>

    <div class="product-grid" id="productGrid">
        </div>

    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-drawer glass-dark" id="cartDrawer">
        <div class="cart-header">
            <h3>Keranjang Belanja</h3>
            <i class="fas fa-times close-cart" onclick="toggleCart()"></i>
        </div>
        <div class="cart-body" id="cartBody"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal" class="gradient-text">Rp 0</span>
            </div>
            <button class="btn-checkout" onclick="processCheckout()">
                <i class="fab fa-whatsapp"></i> Checkout WhatsApp
            </button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Riksan Dropship. | <a href="admin.html">Admin Panel</a></p>
    </footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/database.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
